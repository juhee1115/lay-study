<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>네이버 로그인 폼 만들기</title>
  </head>
  <link rel="stylesheet" href="css/naver.css" />
  <body>
    <div class="form">
      <div class="logo"><img src="images/naver.jpg" alt="naver" /></div>
      <div class="box">
        <div class="T1">
          <ul class="head">
            <li>ID/전화번호</li>
            <li>일회용 번호</li>
            <li>QR코드</li>
          </ul>
        </div>
        <div class="container">
          <div class="T2">
            <input type="ID" placeholder="아이디 또는 전화번호" />
            <input type="password" placeholder="비밀번호" />
          </div>
          <div class="button"><p>로그인 상태 유지</p></div>
          <div>
            <button class="login_btn">로그인</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
